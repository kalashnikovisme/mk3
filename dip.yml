# yaml-language-server: $schema=https://raw.githubusercontent.com/bibendi/dip/refs/heads/master/schema.json
version: '8.0'

compose:
  files:
    - .dockerdev/compose.yml
  project_name: fighting-ai

interaction:
  shell:
    description: Open a shell in the app container
    service: app
    command: bash
    compose:
      run_options: [no-deps]

  ruby:
    description: Run ruby in the app container
    service: app
    command: ruby
    compose:
      run_options: [no-deps]

  bundle:
    description: Run bundler in the app container
    service: app
    command: bundle
    compose:
      run_options: [no-deps]

  rspec:
    description: Run RSpec tests
    service: app
    command: bundle exec rspec
    compose:
      run_options: [no-deps]

  rubocop:
    description: Run RuboCop linter
    service: app
    command: bundle exec rubocop
    compose:
      run_options: [no-deps]

  learn:
    description: "PPO training. Usage: dip learn [match-name] [debug]  e.g. dip learn sub-zero-vs-sindel debug"
    service: app
    command: bundle exec ruby bin/learn

  learn_watch:
    description: "PPO training with live Xephyr window on host desktop. Usage: dip learn_watch [match-name]"
    service: app_watch
    command: bundle exec ruby bin/learn

  retroarch:
    description: Launch RetroArch with the MK3 ROM and snes9x core
    service: app
    command: >-
      retroarch
      -L /usr/lib/x86_64-linux-gnu/libretro/snes9x_libretro.so
      -S /app/data/matches/
      -e 0
      /app/mk3.sfc

  scenario:
    description: Run a scenario script against a live match state
    service: app
    command: bundle exec ruby bin/scenario

  scenario_watch:
    description: Run a scenario script with live Xephyr window on host desktop
    service: app_watch
    command: bundle exec ruby bin/scenario

  watch-match:
    description: Watch a recorded match replay
    service: app
    command: bundle exec ruby bin/watch-match

  play-vs-ai:
    description: Play against the trained AI
    service: app
    command: bundle exec ruby bin/play-vs-ai

provision:
  - dip compose build
  - dip compose run --rm --no-deps app bundle install
  - dip compose run --rm --no-deps app pip3 install -r requirements.txt
